name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies (for egui/rodio/rfd on Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libdbus-1-dev \
            pkg-config \
            libssl-dev \
            libgtk-3-dev \
            libxcb1-dev \
            libxkbcommon-dev \
            libvulkan1 \
            mesa-vulkan-drivers

      - name: Build release binary
        run: |
          cargo build --release --all-features
          strip target/release/bellforge

      - name: Prepare release artifacts
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          mkdir -p release
          
          # Raw binary (for people who just want the executable)
          cp target/release/bellforge release/bellforge
          
          # Tarball matching what bellforge-bin PKGBUILD expects
          mkdir -p tarball
          cp target/release/bellforge tarball/bellforge-${VERSION}-x86_64
          cp bellforge.desktop tarball/bellforge-${VERSION}.desktop
          cp assets/icon.svg tarball/bellforge-${VERSION}.svg
          
          cd tarball
          tar -czvf ../release/bellforge-${VERSION}-x86_64.tar.gz \
            bellforge-${VERSION}-x86_64 \
            bellforge-${VERSION}.desktop \
            bellforge-${VERSION}.svg
          cd ..

          # Also provide a simple zip for convenience
          cd tarball
          zip -r ../release/bellforge-${VERSION}-x86_64.zip \
            bellforge-${VERSION}-x86_64 \
            bellforge-${VERSION}.desktop \
            bellforge-${VERSION}.svg
          cd ..

          ls -la release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: bellforge ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            release/bellforge
            release/bellforge-*-x86_64.tar.gz
            release/bellforge-*-x86_64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Arch package artifact (optional for AUR helpers)
        uses: actions/upload-artifact@v4
        with:
          name: arch-package
          path: release/*.tar.gz
          retention-days: 7

  # Optional but very nice: Build the real Arch package inside an official Arch container
  build-arch-package:
    runs-on: ubuntu-latest
    container: archlinux
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies (Arch)
        run: |
          pacman -Syu --noconfirm \
            base-devel \
            sudo \
            git \
            rust \
            cargo \
            alsa-lib \
            dbus \
            pkgconf

      - name: Build Arch package as non-root user
        run: |
          useradd -m builder
          chown -R builder: .
          sudo -u builder makepkg -s --noconfirm

      - name: Rename package for release
        run: |
          PKG=$(ls -1 *.pkg.tar.zst | head -n1)
          VERSION="${GITHUB_REF#refs/tags/v}"
          mv "$PKG" "bellforge-${VERSION}-x86_64.pkg.tar.zst"
          ls -la *.pkg.tar.zst

      - name: Generate .SRCINFO for both packages
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          
          chown -R builder: .
          
          # Generate .SRCINFO for source package
          sudo -u builder makepkg --printsrcinfo > bellforge-${VERSION}.SRCINFO
          
          # For bin package
          cd bellforge-bin
          sudo -u builder makepkg --printsrcinfo > ../bellforge-bin-${VERSION}.SRCINFO
          cd ..

      - name: Upload Arch package and .SRCINFO to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            bellforge-*-x86_64.pkg.tar.zst
            bellforge-*.SRCINFO
            bellforge-bin-*.SRCINFO
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

